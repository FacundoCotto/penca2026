services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: penca
      POSTGRES_PASSWORD: penca
      POSTGRES_DB: penca
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U penca"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://penca:penca@db:5432/penca
      # En produccion: PENCA_ENV=production exige un JWT_SECRET fuerte
      # (generar con `openssl rand -hex 32`) y CORS_ORIGINS con el dominio real.
      PENCA_ENV: ${PENCA_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_ALG: HS256
      JWT_EXPIRE_MIN: "1440"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
